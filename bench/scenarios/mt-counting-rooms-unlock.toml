# Turn 2: Student implements basic DFS but no visited check
[[turns]]
trigger = "user idle for 45s"
elapsed_secs = 240
user_message = "I think each room is a group of connected dots. Let me try searching from each one."

[turns.code]
text = """
n, m = map(int, input().split())
grid = [input() for _ in range(n)]

def explore(i, j):
    if i < 0 or i >= n or j < 0 or j >= m:
        return
    if grid[i][j] == '#':
        return
    explore(i+1, j)
    explore(i-1, j)
    explore(i, j+1)
    explore(i, j-1)

count = 0
for i in range(n):
    for j in range(m):
        if grid[i][j] == '.':
            explore(i, j)
            count += 1
print(count)
"""

[turns.expect]
state = "approaching"
obs_id = "cf:1292B:route:1:obs:2"
min_confidence = 0.4
must_be_socratic = true
banned_patterns = ["visited[", "visited ="]

# Turn 3: Student adds visited array, recursive DFS works on small input
[[turns]]
trigger = "test failure on test 8"
elapsed_secs = 420
user_message = "Added visited array but now it crashes on big inputs with recursion error"

[turns.code]
text = """
import sys
sys.setrecursionlimit(10**6)
n, m = map(int, input().split())
grid = [input() for _ in range(n)]
visited = [[False]*m for _ in range(n)]

def explore(i, j):
    if i < 0 or i >= n or j < 0 or j >= m:
        return
    if visited[i][j] or grid[i][j] == '#':
        return
    visited[i][j] = True
    explore(i+1, j)
    explore(i-1, j)
    explore(i, j+1)
    explore(i, j-1)

count = 0
for i in range(n):
    for j in range(m):
        if grid[i][j] == '.' and not visited[i][j]:
            explore(i, j)
            count += 1
print(count)
"""

[turns.expect]
state = "approaching"
obs_id = "cf:1292B:route:1:obs:4"
min_confidence = 0.5
must_be_socratic = true
banned_patterns = ["stack = [", "deque", "collections.deque"]
