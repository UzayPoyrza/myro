[scenario]
name = "Coin Change — greedy to correct DP journey"
problem = "cf-996B"
route = 0

# Turn 1: Student tries greedy
[[turns]]
trigger = "test failure on test 1"
elapsed_secs = 120

[turns.code]
text = """
n, S = map(int, input().split())
coins = sorted(map(int, input().split()), reverse=True)
count = 0
remaining = S
for c in coins:
    while remaining >= c:
        remaining -= c
        count += 1
if remaining == 0:
    print(count)
else:
    print(-1)
"""

[turns.expect]
state = "moving_away"
obs_id = "cf:996B:route:1:obs:1"
min_confidence = 0.5
must_be_socratic = true
banned_patterns = ["dp[", "dp ="]

# Turn 2: Student tries DP but with wrong recurrence (uses += instead of min)
[[turns]]
trigger = "test failure on test 1"
elapsed_secs = 300
user_message = "Ok greedy doesn't work. Let me try DP."

[turns.code]
text = """
n, S = map(int, input().split())
coins = list(map(int, input().split()))
dp = [0] * (S + 1)
for i in range(1, S + 1):
    for c in coins:
        if i >= c:
            dp[i] += dp[i - c] + 1
print(dp[S] if dp[S] > 0 else -1)
"""

[turns.expect]
state = "approaching"
obs_id = "cf:996B:route:1:obs:1"
min_confidence = 0.4
must_be_socratic = true
banned_patterns = ["min(dp", "dp[i - c] + 1"]

# Turn 3: Student gets correct DP
[[turns]]
trigger = "user idle for 30s"
elapsed_secs = 480
user_message = "I think I need min not += right?"

[turns.code]
text = """
n, S = map(int, input().split())
coins = list(map(int, input().split()))
INF = float('inf')
dp = [INF] * (S + 1)
dp[0] = 0
for i in range(1, S + 1):
    for c in coins:
        if i >= c and dp[i - c] + 1 < dp[i]:
            dp[i] = dp[i - c] + 1
print(dp[S] if dp[S] != INF else -1)
"""

[turns.expect]
state = "found"
obs_id = "cf:996B:route:1:obs:3"
min_confidence = 0.7
must_be_socratic = false
banned_patterns = []
