[scenario.code]
text = """
n = int(input())
dp = list(map(int, input().split()))  # misleading: this is the input array!
arr = [1] * n  # this is actually the dp table
for i in range(n):
    for j in range(i):
        if dp[j] < dp[i]:
            arr[i] = max(arr[i], arr[j] + 1)
# forgot to print the answer
"""

